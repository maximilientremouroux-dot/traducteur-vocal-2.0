<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Site Traducteur</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo en haut -->
  <div class="logo-container">
    <img src="logo.png" alt="Logo VoxSpeech" width="200">
  </div>

  <h1>Bienvenue sur mon site traducteur !</h1>

  <div class="container">
    <textarea id="texteOriginal" placeholder="Dis quelque chose ou écris ici..."></textarea>
    <button id="btnParler">🎤 Parler</button>
    <button id="btnLire">📢 Lire</button>
    <textarea id="texteTraduit" placeholder="La traduction apparaît ici..." readonly></textarea>
  </div>

  <!-- Widget Google Traduction -->
  <div id="google_translate_element"></div>
  <script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
  }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script src="script.js"></script>
</body>
</html>
